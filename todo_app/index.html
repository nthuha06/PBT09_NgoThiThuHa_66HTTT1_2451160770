<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Todo App</h1>

    <!-- Form thêm todo -->
    <form id="todoForm">

        <input
            type="text"
            id="todoInput"
            placeholder="What needs to be done?"
        >

        <button type="submit">
            Add
        </button>

    </form>

    <!-- Filter -->
    <div class="filters">

        <button data-filter="all">
            All
        </button>

        <button data-filter="active">
            Active
        </button>

        <button data-filter="completed">
            Completed
        </button>

    </div>

    <!-- Danh sách todo -->
    <ul id="todoList"></ul>

    <!-- Footer -->
    <div class="footer">

        <p id="count">
            0 items left
        </p>

        <button id="clearCompleted">
            Clear Completed
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
